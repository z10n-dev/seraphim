###################
### KEYBINDINGS ###
###################

bind = $mainMod, W, killactive,
bind = SHIFT $mainMod, M, exit,
bind = $mainMod, M, exec, hyprlock
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, I, togglefloating,
bind = $mainMod, u, togglesplit, # dwindle
bind = $mainMod, f, fullscreen,

# Move focus with mainMod + hjkl
bind = ALT, h, movefocus, l
bind = ALT, l, movefocus, r
bind = ALT, k, movefocus, u
bind = ALT, j, movefocus, d

bind = $mainMod, l, focusmonitor, r
bind = $mainMod, h, focusmonitor, l
bind = $mainMod, j, workspace, m+1
bind = $mainMod, k, workspace, m-1

bind = $mainMod Shift , p, exec, ~/.config/hypr/scripts/toggle-display-mode.sh menu
bind = $mainMod Shift, K, exec, ~/.config/hypr/scripts/cycle-monitor-position.sh

# ─── Keybinds zum Öffnen der Special Workspaces ────────
bind = ALT, S, togglespecialworkspace, spotify
bind = ALT, W, togglespecialworkspace, whatsapp
bind = ALT, T, togglespecialworkspace, term


# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = ALT, 1, workspace, 11
bind = ALT, 2, workspace, 12
bind = ALT, 3, workspace, 13
bind = ALT, 4, workspace, 14
bind = ALT, 5, workspace, 15
bind = ALT, 6, workspace, 16
bind = ALT, 7, workspace, 17
bind = ALT, 8, workspace, 18
bind = ALT, 9, workspace, 19
bind = ALT, 0, workspace, 20

bind = CTRL, 1, workspace, 21
bind = CTRL, 2, workspace, 22
bind = CTRL, 3, workspace, 23
bind = CTRL, 4, workspace, 24
bind = CTRL, 5, workspace, 25
bind = CTRL, 6, workspace, 26
bind = CTRL, 7, workspace, 27
bind = CTRL, 8, workspace, 28
bind = CTRL, 9, workspace, 29
bind = CTRL, 0, workspace, 30

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = ALT SHIFT, 1, movetoworkspace, 11
bind = ALT SHIFT, 2, movetoworkspace, 12
bind = ALT SHIFT, 3, movetoworkspace, 13
bind = ALT SHIFT, 4, movetoworkspace, 14
bind = ALT SHIFT, 5, movetoworkspace, 15
bind = ALT SHIFT, 6, movetoworkspace, 16
bind = ALT SHIFT, 7, movetoworkspace, 17
bind = ALT SHIFT, 8, movetoworkspace, 18
bind = ALT SHIFT, 9, movetoworkspace, 19
bind = ALT SHIFT, 0, movetoworkspace, 20

bind = CTRL SHIFT, 1, movetoworkspace, 21
bind = CTRL SHIFT, 2, movetoworkspace, 22
bind = CTRL SHIFT, 3, movetoworkspace, 23
bind = CTRL SHIFT, 4, movetoworkspace, 24
bind = CTRL SHIFT, 5, movetoworkspace, 25
bind = CTRL SHIFT, 6, movetoworkspace, 26
bind = CTRL SHIFT, 7, movetoworkspace, 27
bind = CTRL SHIFT, 8, movetoworkspace, 28
bind = CTRL SHIFT, 9, movetoworkspace, 29
bind = CTRL SHIFT, 0, movetoworkspace, 30

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, m+1
bind = $mainMod, mouse_up, workspace, m-1

bind = , 112, workspace, m+1
bind = , 117, workspace, m-1

bind = , mouse:281, workspace, m+1
bind = , mouse:282, workspace, m-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow